name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: pokomiko
  API_IMAGE_NAME: cloud-native-boilerplate-api
  WORKER_IMAGE_NAME: cloud-native-boilerplate-worker
  KUBE_NAMESPACE: default
  API_DEPLOYMENT_NAME: cloud-api
  WORKER_DEPLOYMENT_NAME: cloud-worker
  API_CONTAINER_NAME: api
  WORKER_CONTAINER_NAME: worker

jobs:
  lint-test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install flake8 pytest pip-audit==2.7.3

      - name: Run flake8
        run: |
          set -euo pipefail
          flake8 src/

      - name: Run tests
        run: |
          set -euo pipefail
          PYTHONPATH=src pytest -q src/test_api.py

      - name: Audit Python dependencies
        run: |
          set -euo pipefail
          pip-audit -r src/requirements.txt || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WORKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    needs: lint-test-build-push
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify namespace-level access
        shell: bash
        run: |
          set -euo pipefail
          kubectl config get-contexts
          kubectl config current-context
          kubectl get namespace "${KUBE_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${KUBE_NAMESPACE}"
          kubectl auth can-i get pods -n "${KUBE_NAMESPACE}"
          kubectl auth can-i create deployment -n "${KUBE_NAMESPACE}" || true
          kubectl auth can-i update deployment -n "${KUBE_NAMESPACE}" || true

      - name: Apply manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/configmap.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/api-deployment.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/api-service.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/api-pdb.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/worker-deployment.yaml
          kubectl apply -n "${KUBE_NAMESPACE}" -f k8s/hpa.yaml

      - name: Update deployment images
        shell: bash
        run: |
          set -euo pipefail
          kubectl set image deployment/${API_DEPLOYMENT_NAME} \
            ${API_CONTAINER_NAME}=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }} \
            -n "${KUBE_NAMESPACE}"

          kubectl set image deployment/${WORKER_DEPLOYMENT_NAME} \
            ${WORKER_CONTAINER_NAME}=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }} \
            -n "${KUBE_NAMESPACE}"

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/${API_DEPLOYMENT_NAME} -n "${KUBE_NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/${WORKER_DEPLOYMENT_NAME} -n "${KUBE_NAMESPACE}" --timeout=180s

      - name: Debug rollout failure
        if: failure()
        shell: bash
        run: |
          set +e
          echo "===== DEPLOYMENTS ====="
          kubectl get deployments -n "${KUBE_NAMESPACE}" -o wide

          echo "===== REPLICASETS ====="
          kubectl get rs -n "${KUBE_NAMESPACE}" -o wide

          echo "===== PODS ====="
          kubectl get pods -n "${KUBE_NAMESPACE}" -o wide

          echo "===== DESCRIBE API DEPLOYMENT ====="
          kubectl describe deployment/${API_DEPLOYMENT_NAME} -n "${KUBE_NAMESPACE}"

          echo "===== DESCRIBE WORKER DEPLOYMENT ====="
          kubectl describe deployment/${WORKER_DEPLOYMENT_NAME} -n "${KUBE_NAMESPACE}"

          echo "===== DESCRIBE PODS ====="
          for pod in $(kubectl get pods -n "${KUBE_NAMESPACE}" -o name); do
            echo "----- $pod -----"
            kubectl describe -n "${KUBE_NAMESPACE}" "$pod"
          done

          echo "===== RECENT EVENTS ====="
          kubectl get events -n "${KUBE_NAMESPACE}" --sort-by=.metadata.creationTimestamp | tail -n 100

      - name: Show resources
        if: always()
        shell: bash
        run: |
          kubectl get all -n "${KUBE_NAMESPACE}"
          kubectl apply -f k8s/ -n cloud-boilerplate
